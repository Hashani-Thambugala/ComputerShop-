<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Delfa Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* MAIN CARD */
        .auth-container {
            width: 100%;
            max-width: 1200px;
            max-height: 700px;
            background: #1e293b;
            border-radius: 25px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            
        }

        /* LEFT */
        .auth-image {
            position: relative;
            min-height: 700px;
            background:url("images/auth2.jpg") center/cover;
        }

        .logo {
            padding: 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .logo h2 {
            font-size: 24px;
            letter-spacing: 1px;
        }

        .overlay-content {
            position: absolute;
            bottom: 60px;
            left: 40px;
            color: white;
        }

        .overlay-content h1 {
            font-size: 50px;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .overlay-content p {
            font-size: 18px;
            max-width: 400px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        /* RIGHT */
        .auth-form {
            padding: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #1e293b;
        }

        .auth-form h1 {
            font-size: 50px;
            color: white;
            margin-bottom: 10px;
        }

        .auth-form p {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .auth-form a {
            color: #60a5fa;
            text-decoration: none;
            transition: 0.2s;
        }

        .auth-form a:hover {
            color: #93bbfc;
            text-decoration: underline;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .auth-form input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #334155;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.2s;
            outline: none;
        }

        .auth-form input::placeholder {
            color: #94a3b8;
        }

        .auth-form input:focus {
            background: #3b4a5e;
            box-shadow: 0 0 0 2px #2563eb;
        }

        .check {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
            margin-bottom: 20px;
            font-size: 15px;
            cursor: pointer;
        }

        .check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2563eb;
            cursor: pointer;
            margin: 0;
            padding: 0;
            background: #334155;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .primary-btn {
            width: 100%;
            padding: 15px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: .3s;
        }

        .primary-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
        }

        .primary-btn:active {
            transform: translateY(0);
        }

        .forgot {
            display: block;
            margin-bottom: 20px;
            text-align: right;
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #475569;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: #1e293b;
            padding: 0 10px;
            color: #94a3b8;
            font-size: 14px;
        }

        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .social-btns button {
            padding: 14px;
            border: 1px solid #475569;
            background: transparent;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: .3s;
            font-size: 15px;
            font-weight: 500;
        }

        .social-btns button:hover {
            background: #334155;
            border-color: #60a5fa;
            transform: translateY(-2px);
        }

        .social-btns i {
            margin-right: 8px;
        }

        /* TABLET */
        @media (max-width: 992px) {
            .auth-container {
                grid-template-columns: 1fr;
                max-width: 500px;
            }

            .auth-image {
                min-height: 250px;
            }

            .logo {
                padding: 20px;
            }

            .logo h2 {
                font-size: 20px;
            }

            .overlay-content {
                bottom: 30px;
                left: 30px;
            }

            .overlay-content h1 {
                font-size: 28px;
                margin-bottom: 10px;
            }

            .overlay-content p {
                font-size: 15px;
                max-width: 300px;
            }

            .auth-form {
                padding: 40px 35px;
            }

            .auth-form h1 {
                font-size: 32px;
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .auth-container {
                max-width: 100%;
                border-radius: 15px;
            }

            .auth-image {
                min-height: 200px;
            }

            .logo h2 {
                font-size: 18px;
            }

            .overlay-content {
                bottom: 20px;
                left: 20px;
            }

            .overlay-content h1 {
                font-size: 22px;
                margin-bottom: 8px;
            }

            .overlay-content p {
                font-size: 14px;
                max-width: 250px;
            }

            .auth-form {
                padding: 25px 20px;
            }

            .auth-form h1 {
                font-size: 28px;
            }

            .auth-form p {
                font-size: 14px;
                margin-bottom: 20px;
            }

            .name-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .auth-form input {
                padding: 12px 15px;
                font-size: 14px;
                margin-bottom: 12px;
            }

            .check {
                font-size: 14px;
                margin-bottom: 15px;
            }

            .check input[type="checkbox"] {
                width: 16px;
                height: 16px;
            }

            .primary-btn {
                padding: 13px;
                font-size: 15px;
            }

            .divider {
                margin: 20px 0;
            }

            .divider span {
                font-size: 13px;
                padding: 0 8px;
            }

            .social-btns {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .social-btns button {
                padding: 12px;
                font-size: 14px;
            }
        }

        /*  SMALL MOBILE */
        @media (max-width: 480px) {
            .auth-container {
                border-radius: 12px;
            }

            .auth-image {
                min-height: 160px;
            }

            .logo {
                padding: 15px;
            }

            .logo h2 {
                font-size: 16px;
            }

            .overlay-content {
                bottom: 15px;
                left: 15px;
            }

            .overlay-content h1 {
                font-size: 18px;
                margin-bottom: 5px;
            }

            .overlay-content p {
                font-size: 12px;
                max-width: 200px;
            }

            .auth-form {
                padding: 20px 15px;
            }

            .auth-form h1 {
                font-size: 24px;
            }

            .auth-form p {
                font-size: 13px;
                margin-bottom: 15px;
            }

            .auth-form input {
                padding: 10px 12px;
                font-size: 13px;
                margin-bottom: 10px;
                border-radius: 10px;
            }

            .check {
                font-size: 13px;
                gap: 8px;
            }

            .check input[type="checkbox"] {
                width: 15px;
                height: 15px;
            }

            .primary-btn {
                padding: 12px;
                font-size: 14px;
                border-radius: 10px;
            }

            .divider {
                margin: 15px 0;
            }

            .divider::before,
            .divider::after {
                width: 30%;
            }

            .divider span {
                font-size: 12px;
            }

            .social-btns {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .social-btns button {
                padding: 11px;
                font-size: 13px;
                border-radius: 10px;
            }
        }

        /* SMALL (320px) */
        @media (max-width: 360px) {
            .auth-form h1 {
                font-size: 20px;
            }

            .auth-form input {
                padding: 8px 10px;
                font-size: 12px;
            }

            .primary-btn {
                padding: 10px;
                font-size: 13px;
            }

            .social-btns button {
                padding: 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">

        <!-- LEFT SIDE -->
        <div class="auth-image">

            <div class="logo">
                <h2>Delfa Tech</h2>
            </div>

            <!-- <div class="overlay-content">
                <h1>
                    Powerful Tech,<br>
                    Smarter Shopping
                </h1>

                <p>
                    Discover laptops, gaming gear,
                    accessories and more.
                </p>
            </div> -->

        </div>

        <!-- RIGHT SIDE -->
        <div class="auth-form">

            <h1>Create Account</h1>

            <p>
                Already have an account?
                <a href="signin.html">Login</a>
            </p>

            <form>

                <div class="name-row">

                    <input type="text" placeholder="First Name">

                    <input type="text" placeholder="Last Name">

                </div>

                <input type="email" placeholder="Email Address">

                <input type="password" placeholder="Password">

                <input type="password" placeholder="Confirm Password">

                <label class="check">

                    <input type="checkbox">

                    I agree to Terms & Conditions

                </label>

                <button type="submit" class="primary-btn">
                    Create Account
                </button>

            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <div class="social-btns">

                <button>
                    <i class="fab fa-google"></i>
                    Google
                </button>

                <button>
                    <i class="fab fa-apple"></i>
                    Apple
                </button>

            </div>

        </div>

    </div>

</body>
</html>
